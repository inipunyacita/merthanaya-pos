services:
  # FastAPI Backend — exposed on host port 8002
  backend:
    build: ./backend
    container_name: merthanaya-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env

  # Next.js Frontend — exposed on host port 3002
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: merthanaya-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

networks:
  default:
    driver: bridge
