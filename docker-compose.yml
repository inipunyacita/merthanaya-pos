services:
  # FastAPI Backend — exposed on host port 8002
  backend:
    build: ./backend
    container_name: merthanaya-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env

  # Next.js Frontend — exposed on host port 3002
  # .env.production is copied into the Docker build context automatically
  frontend:
    build:
      context: ./frontend
    container_name: merthanaya-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      - backend

networks:
  default:
    driver: bridge
