services:
  # FastAPI Backend — exposed on host port 8002
  backend:
    build: ./backend
    container_name: merthanaya-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Next.js Frontend — exposed on host port 3002
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: merthanaya-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - ./frontend/.env.production
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    driver: bridge
